# =====================================================================
# Datasource — HikariCP
# =====================================================================
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5

# =====================================================================
# JPA / Hibernate
# =====================================================================
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://localhost:5432/ecom
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================================
# JWT Security
# IMPORTANT: Replace jwt.secret with a new value in production.
# Generate with: openssl rand -base64 64
# The decoded key must be >= 512 bits for HS512.
# =====================================================================
jwt.secret=PQNdkGzv4II43yKolG1EmOcytQInpl2QwU2mpBlVZrB+Bw1Gg9go6SZk0kOLOWprg4C/XjACFwOvmjFbPgnhhg

# Access token lifetime  — 15 minutes (seconds)
jwt.expiration=900

# Refresh token lifetime — 7 days (seconds)
jwt.refresh-expiration=604800
